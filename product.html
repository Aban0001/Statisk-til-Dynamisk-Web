<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="base.css" />
    <title>Product Info</title>
  </head>

  <body class="product">
    <header class="mainNav">
      <a href="index.html">
        <h1>Fashion<span>R</span>Us</h1>
      </a>
      <nav>
        <a href="index.html">Categories</a>
        <a href="#">Brands</a>
        <a href="#">Seasons</a>
      </nav>
    </header>

    <main id="productContainer">
      <figure>
        <img src="https://kea-alt-del.dk/t7/images/webp/640/1163.webp" alt="Produktbillede" class="productImage" />
        <!-- <span class="saleLabel">Udsalg!</span> -->
      </figure>

      <section class="productDetails">
        <h2 class="productName">Sahara Team India Fanwear Round Neck Jersey</h2>
        <div>
          <p class="articleType"><span class="bold">Type:</span> T-shirt</p>
          <p class="productCategory"><span class="bold">Kategori:</span> Apparel</p>
          <p class="productPrice"><span class="bold">Pris:</span> 1595,-</p>
        </div>
        <label class="sizeSelector">
          Choose a size
          <select>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
          </select>
        </label>
        <button class="buyButton">Køb nu</button>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
